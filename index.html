<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Password Generator</h1>
      </header>
      <div class="card">
        <div class="card-header">
          <h2>Generate a Password</h2>
        </div>
        <div class="card-body">
          <textarea
            readonly
            id="password"
            placeholder="Your Secure Password"
            aria-label="Generated Password"
          ></textarea>
        </div>

        <div class="card-footer">
          <button id="generate" class="btn">Generate Password</button>
        </div>
      </div>
<!-- Modal for selction menu of character types -->
    <dialog>
          <form>
            <h2>Please check all character types required</h2>
            <div>
              <label>
                <input type="checkbox" name="lowercaseLetters" value="lcaseArray">
              </label>
              <label>
                <input type="checkbox" name="uppercaseLetters" value="ucaseArray">
              </label>
              <label>
                <input type="checkbox" name="numberArray" value="numberArray">
              </label>
              <label>
                <input type="checkbox" name="symbols" value="symbols">
              </label>
            </div>
          </form>
        </dialog>
<!-- Script javascript being pulled for password generation -->
    </div>
    <script src="script.js"></script>
  </body>
</html>
